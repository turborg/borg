name: Auto-PR staging → main

# Keep a single open pull request from `staging` to `main`, opened and refreshed
# automatically on every push to `staging`. The body lists the commits the PR
# would merge, so `main` always has a ready-to-review release candidate.

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Open or refresh the staging → main PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base=main
          head=staging

          git fetch --quiet origin "$base" "$head"

          # Commits on staging not yet on main (newest first).
          mapfile -t subjects < <(git log --no-merges --pretty='- %s' "origin/$base..origin/$head")
          if [ "${#subjects[@]}" -eq 0 ]; then
            echo "staging is not ahead of main — nothing to PR."
            exit 0
          fi

          {
            echo "## Release candidate: \`$head\` → \`$base\`"
            echo
            echo "Opened and refreshed automatically by CI on every push to \`$head\`."
            echo "Merges the following commits into \`$base\`:"
            echo
            printf '%s\n' "${subjects[@]}"
            echo
            echo "<sub>Body is regenerated on each push — don't hand-edit it.</sub>"
          } > /tmp/pr-body.md

          number="$(gh pr list --base "$base" --head "$head" --state open \
            --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh pr edit "$number" --title "Release: $head → $base" --body-file /tmp/pr-body.md
            echo "Refreshed PR #$number"
          else
            gh pr create --base "$base" --head "$head" \
              --title "Release: $head → $base" --body-file /tmp/pr-body.md
            echo "Opened a new PR"
          fi
