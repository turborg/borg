name: CLA Assistant

# Uses pull_request_target so the bot can write the signature record and set a
# status on PRs from forks. This is safe here ONLY because the job never checks
# out or executes the PR's code — it just posts comments and records signatures.
# Do not add an actions/checkout of the PR head to this workflow.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURE_TOKEN }}
        with:
          path-to-signatures: signatures/borg-cla.json
          path-to-document: https://github.com/turborg/borg/blob/main/CLA.md
          branch: main
          allowlist: dependabot[bot],release-please[bot]
          remote-organization-name: turborg
          remote-repository-name: cla-signatures
          custom-notsigned-prcomment: |
            Thanks for your contribution! Before we can merge it, you need to sign the [Contributor License Agreement (CLA)](https://github.com/turborg/borg/blob/main/CLA.md).

            Please read the CLA, then post the following comment in this PR to sign it:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thanks!'
